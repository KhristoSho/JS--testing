<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>CardValidator</title>
</head>
<body>
  <div class="card">
    <div class="card-examples">
      <div id="amex" class="card-example"><img src="./img/icon-amex.png" alt="amex"></div>
      <div id="diners" class="card-example"><img src="./img/icon-diners.png" alt="diners"></div>
      <div id="discover" class="card-example"><img src="./img/icon-discover.png" alt="discover"></div>
      <div id="jcb" class="card-example"><img src="./img/icon-jcb.png" alt="jcb"></div>
      <div id="mastercard" class="card-example"><img src="./img/icon-mastercard.png" alt="mastercard"></div>
      <div id="mir" class="card-example"><img src="./img/icon-mir.png" alt="mir"></div>
      <div id="visa" class="card-example"><img src="./img/icon-visa.png" alt="visa"></div>
    </div>
    <div class="card-form">
      <form action="submit">
        <input type="text" placeholder="card number" class="card-form__input" name="card-number">
        <button class="card-form__button">Click to Validate</button>
      </form>
    </div>
  </div>
</body>
</html>
